# NC Phase 1 W3 — FULL UKB 37,775 RSCM run. This is the paper's primary result.
# Uses all 64 pre-extracted chunks aggregated via prepare_ukb37775_from_chunks.py.

paths:
  aligned_features_dir: data/aligned_features_ukb37775
  splits_dir: data/splits_ukb37775
id_column: SubjectID
results_dir: results
dataset2_external_use_all: true
seed: 42
use_cuda: false

rscm:
  x_variant: default
  y_variant: raw
  fisher_z: true
  metric: logE
  harmonize: true
  harmonize_cols: [Age, Gender]

target_pca:
  enabled: true
  k: 3
