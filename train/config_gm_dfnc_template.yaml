analysis:
  out_dir: /home/users/ybi3/sfcoupling/results/gm_dfnc
  methods: [nuclear_norm, linear_optshrink]
  seeds: [42]
  ranks: [eff, 5, 10, 20]
  n_perm: 1000
  n_boot: 250
  mantel_perm: 1000
  rank_curve_max: 40
  local_state_k: 10
  prediction_alphas: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
  clinical_Cs: [0.01, 0.1, 1.0, 10.0, 100.0]
  clinical_boot: 500
  primary_method: nuclear_norm
  primary_rank: eff
  primary_solution: K5_ref

